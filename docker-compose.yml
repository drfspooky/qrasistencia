version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: qr_attendance_db
    environment:
      POSTGRES_DB: qr_attendance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: ./backend
    container_name: qr_attendance_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://postgres:postgrespassword@db:5432/qr_attendance
      - SECRET_KEY=django-insecure-mvp-qr-attendance-key-2026-xyz
      - DEBUG=True
      - ALLOWED_HOSTS=*
    depends_on:
      - db

volumes:
  postgres_data:
